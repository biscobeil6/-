<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今夜のお茶係</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2d2733;
      --paper: #fffaf4;
      --accent: #6f4d88;
      --accent-soft: #efe4f5;
      --line: #dacddf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background: linear-gradient(145deg, #f7eef9, var(--paper));
    }
    main {
      width: min(100%, 560px);
      padding: 34px 26px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 16px 40px rgba(60, 38, 74, .12);
      text-align: center;
    }
    .eyebrow {
      margin: 0 0 8px;
      font-size: .9rem;
      letter-spacing: .08em;
      color: var(--accent);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 6vw, 2.25rem);
    }
    .lead {
      margin: 14px auto 22px;
      line-height: 1.8;
      max-width: 34em;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 700;
      color: white;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 7px 16px rgba(91, 50, 117, .22);
    }
    button:active { transform: translateY(1px); }
    .result {
      min-height: 146px;
      margin-top: 26px;
      padding: 20px;
      border-radius: 18px;
      background: var(--accent-soft);
      display: grid;
      place-items: center;
    }
    .tea {
      margin: 0 0 8px;
      font-size: 1.28rem;
      font-weight: 800;
    }
    .note {
      margin: 0;
      line-height: 1.7;
    }
    footer {
      margin-top: 18px;
      font-size: .82rem;
      color: #6b6470;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">A tiny tea app</p>
    <h1>今夜のお茶係</h1>
    <p class="lead">気分をひとつ押していただければ、今夜に似合う一杯を選びます。</p>

    <button id="serve" type="button">お茶を淹れて</button>

    <section class="result" aria-live="polite">
      <div>
        <p class="tea">まだ選んでいません</p>
        <p class="note">ボタンを押すと、一杯おすすめします。</p>
      </div>
    </section>

    <footer>ページを開き直すたび、何度でも選べます。</footer>
  </main>

  <script>
    const teas = [
      ["ダージリン・ファーストフラッシュ", "軽やかで青い香り。頭を少しだけ澄ませたい夜に。"],
      ["アッサム", "しっかりしたコク。疲れた日の、甘いものの隣に。"],
      ["アールグレイ", "ベルガモットの香りで気分転換。仕事終わりの切り替えに。"],
      ["ニルギリ", "すっきり、まっすぐ。迷いを少し整えたいときに。"],
      ["ルイボスティー", "カフェインを避けたい夜に。ゆっくり休む準備の一杯です。"],
      ["カモミール", "やわらかい香り。今日はもう頑張った、という日に。"]
    ];

    const tea = document.querySelector(".tea");
    const note = document.querySelector(".note");

    document.querySelector("#serve").addEventListener("click", () => {
      const [name, message] = teas[Math.floor(Math.random() * teas.length)];
      tea.textContent = name;
      note.textContent = message;
    });
  </script>
</body>
</html>
